                <h1>ホーム</h1>

            <section class="page-body">
                <h2>このツールについて</h2>
                <p>ウマ娘のスキル数から、競技場のスコアを大まかに計算するツールです。</p>
                <p>左のサイドバーから「スキルカウント」を選択して、スクショからスキル数をカウントしてください。</p>
                <p>複数のスクショを結合して、縦長の画像からスキル数をカウント可能です。</p>
                <p>カウントしたスキル数は距離を指定して直接設定できます。</p>
            </section>
